# tldps-party — Cloudflare Durable Object party relay for TL-DPS-Meter.
# One PartyRoom Durable Object instance per party code = the authoritative room.
#
# Deploy: `wrangler deploy` (needs a CF API token — see README "Bootstrap").
# Local:  `wrangler dev`   (runs the DO in miniflare locally, no account needed).

name = "tldps-party"
main = "src/index.js"
compatibility_date = "2026-05-01"

[observability]
enabled = true

# Hourly usage snapshot (Obs #4). The scheduled() handler samples the live active-room
# registry and writes a timestamped history entry to ROOMS_KV, so GET /rooms/history can
# show a usage timeline ("how many parties over time") without anyone watching manually.
[triggers]
crons = ["0 * * * *"]

# Durable Object binding. The PartyRoom class is the per-party room.
[[durable_objects.bindings]]
name = "PARTY_ROOM"
class_name = "PartyRoom"

# SQLite-backed storage class. SQLite-backed DOs are intended to be available on
# the Workers FREE plan — verify before assuming the $5/mo Paid plan is required.
[[migrations]]
tag = "v1"
new_sqlite_classes = ["PartyRoom"]

# Feedback intake (KV-only). POST /feedback writes here; the handler guards a
# missing binding, so the worker still serves party/skills if this is ever absent.
[[kv_namespaces]]
binding = "FEEDBACK_KV"
id = "a61e7c1245a14bcc9c96b3cec7da6318"

# Active-room registry (Observability #4, part B — complements the per-room /debug x-ray).
# DOs can't be enumerated, so each PartyRoom writes a `room:<CODE>` summary here on roster
# changes; GET /rooms?key=<DEBUG_KEY> lists live parties (the "how many parties right now"
# signal). Summary rides in KV metadata so /rooms is one list() call. Records carry a 2h
# expirationTtl safety-net. All writes guard a missing binding, so the worker still serves
# if this is ever absent.
[[kv_namespaces]]
binding = "ROOMS_KV"
id = "c28515495a524a2bbe2e7fc7c02d78f5"

# Cross-room encounter analytics D1 (global — survives room expiry).
# The PartyRoom DO writes one row per completed encounter (on final:true) to this shared
# database so encounter shape (boss, gap, submission counts) can be queried across all rooms.
# Used to tune segmentation thresholds and validate encounter-combine logic with real data.
[[d1_databases]]
binding = "ANALYTICS_DB"
database_name = "stoop-analytics"
database_id = "e6e6ba37-0a1f-422f-be4a-740a70f3da75"

# Observability #4 debug auth key (gates BOTH /party/<code>/debug and /rooms).
# Deliberately NOT a [vars] entry: a plaintext var of the same name shadows the secret on
# every deploy and resets it to "" (the original footgun). Use a secret instead — secrets
# persist across deploys untouched:
#   Production: `wrangler secret put DEBUG_KEY`  (encrypted, never in source, durable)
#   Local dev:  DEBUG_KEY=<value> in workers/party/.dev.vars  (gitignored)
# If unset/absent, env.DEBUG_KEY is undefined -> both endpoints return 404 (fail-closed).
