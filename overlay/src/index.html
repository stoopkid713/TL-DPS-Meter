<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Party DPS Overlay</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* Transparent root so the Tauri/WebView2 window shows through where we don't paint.
           The visible panel is .overlay's own translucent background. */
        html, body { background: transparent; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #e2e8f0;
            height: 100vh;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        /* "solid background" fallback (research §3): if a machine hits the WebView2/Chromium
           black-box transparency bug, body.solid-bg paints an opaque panel so it's still usable. */
        body.solid-bg { background: #0b1220; }

        /* Draggable chrome (Tauri moves the frameless window via these regions). */
        [data-tauri-drag-region] { cursor: move; }
        [data-tauri-drag-region] button { cursor: pointer; }

        .overlay {
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: 10px;
            background: rgba(15, 23, 42, 0.82);
            border: 1px solid rgba(148, 163, 184, 0.15);
            border-radius: 10px;
        }

        /* Header — draggable region (Tauri data-tauri-drag-region) */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 8px;
            background: rgba(0,0,0,0.3);
            border-radius: 6px;
            margin-bottom: 8px;
        }
        .title { font-size: 13px; font-weight: 600; color: #94a3b8; display: flex; align-items: center; gap: 6px; }
        .party-code { background: rgba(34, 211, 238, 0.2); color: #22d3ee; padding: 2px 6px; border-radius: 4px; font-family: monospace; font-size: 11px; }
        .header-right { display: flex; align-items: center; gap: 8px; }
        .status { display: flex; align-items: center; gap: 5px; font-size: 10px; color: #94a3b8; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #ef4444; }
        .status-dot.connected { background: #22c55e; box-shadow: 0 0 6px rgba(34, 197, 94, 0.5); }
        .status-dot.recording { background: #ef4444; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .controls { display: flex; gap: 3px; }
        .controls button { background: rgba(255,255,255,0.1); border: none; color: #94a3b8; width: 24px; height: 24px; border-radius: 4px; cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center; }
        .controls button:hover { background: rgba(255,255,255,0.2); color: #e2e8f0; }

        /* Boss header (replaces the old per-target filter — the room picks THE boss) */
        .boss-bar { display: flex; align-items: center; gap: 6px; padding: 5px 8px; margin-bottom: 8px; background: rgba(0,0,0,0.25); border-radius: 5px; font-size: 12px; }
        .boss-cat { color: #fbbf24; font-weight: 600; white-space: nowrap; }
        .boss-name { color: #e2e8f0; font-weight: 600; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .boss-total { color: #64748b; font-size: 11px; white-space: nowrap; }

        .results { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; }
        .result-row { display: grid; grid-template-columns: 24px 1fr 60px 55px; gap: 6px; align-items: center; padding: 7px 8px; background: rgba(0,0,0,0.3); border-radius: 5px; }
        .result-row.self { background: rgba(34, 211, 238, 0.15); border: 1px solid rgba(34, 211, 238, 0.3); }
        .rank { font-weight: 700; font-size: 13px; color: #64748b; text-align: center; }
        .rank.gold { color: #fbbf24; } .rank.silver { color: #94a3b8; } .rank.bronze { color: #cd7f32; }
        .player-info { min-width: 0; }
        .player-name { font-weight: 600; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .pct { color: #64748b; font-weight: 400; font-size: 11px; margin-left: 4px; }
        .damage-bar { height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 3px; overflow: hidden; }
        .damage-bar-fill { height: 100%; background: linear-gradient(90deg, #22d3ee, #a78bfa); border-radius: 2px; transition: width 0.3s ease; }
        .result-row.self .damage-bar-fill { background: linear-gradient(90deg, #22d3ee, #06b6d4); }
        .dps { text-align: right; font-weight: 700; font-size: 13px; color: #22d3ee; }
        .damage { text-align: right; font-size: 11px; color: #94a3b8; }

        .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; color: #64748b; font-size: 12px; text-align: center; gap: 6px; }
        .empty-icon { font-size: 28px; opacity: 0.5; }

        .footer { display: flex; justify-content: space-between; align-items: center; padding-top: 6px; margin-top: 6px; border-top: 1px solid rgba(255,255,255,0.1); font-size: 10px; color: #64748b; }
        .lock-hint { background: rgba(34, 211, 238, 0.15); padding: 2px 6px; border-radius: 3px; color: #22d3ee; }

        .lock-indicator { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); padding: 12px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; display: none; z-index: 1000; pointer-events: none; }
        .lock-indicator.show { display: block; animation: fadeOut 1.5s forwards; }
        @keyframes fadeOut { 0%, 60% { opacity: 1; } 100% { opacity: 0; } }

        /* ---- Member drill-down (C3) ------------------------------------------- */
        /* Clickable row hint */
        .result-row.clickable { cursor: pointer; }
        .result-row.clickable:hover { background: rgba(34, 211, 238, 0.1); border: 1px solid rgba(34, 211, 238, 0.25); }

        /* Detail header */
        .ov-detail-header { display: flex; align-items: center; gap: 8px; padding: 5px 4px 8px; margin-bottom: 6px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .ov-detail-back { background: rgba(34, 211, 238, 0.15); border: 1px solid rgba(34, 211, 238, 0.3); color: #22d3ee; padding: 3px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; font-family: inherit; }
        .ov-detail-back:hover { background: rgba(34, 211, 238, 0.25); }
        .ov-detail-name { font-size: 12px; font-weight: 600; color: #e2e8f0; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .ov-detail-loading { display: flex; align-items: center; justify-content: center; flex: 1; color: #64748b; font-size: 12px; padding: 20px 0; }

        /* pr-skill-list (compact skill table from PartyRender.skillTableHtml compact:true) */
        .pr-skill-list { display: flex; flex-direction: column; gap: 4px; }
        .pr-skill-row { display: grid; grid-template-columns: 1fr 60px 34px 32px; align-items: center; gap: 4px; padding: 4px 6px; background: rgba(0,0,0,0.25); border-radius: 4px; font-size: 11px; }
        .pr-skill-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #e2e8f0; }
        .pr-skill-bar { height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
        .pr-skill-bar span { display: block; height: 100%; background: linear-gradient(90deg, #22d3ee, #a78bfa); border-radius: 2px; }
        .pr-skill-dmg { text-align: right; color: #22d3ee; font-weight: 600; white-space: nowrap; }
        .pr-skill-pct { text-align: right; color: #64748b; white-space: nowrap; }

        /* pr-rot (compact rotation chart from PartyRender.rotationChartHtml compact:true) */
        .pr-rot { display: flex; flex-direction: column; gap: 4px; margin-top: 8px; }
        .pr-rot-meta { font-size: 10px; color: #64748b; padding: 0 2px; }
        .pr-rot-chart.compact { display: flex; align-items: flex-end; gap: 1px; height: 36px; padding: 0 2px; background: rgba(0,0,0,0.2); border-radius: 4px; overflow: hidden; }
        .pr-rot-bar { flex: 1; min-width: 1px; background: rgba(34, 211, 238, 0.6); border-radius: 1px 1px 0 0; transition: height 0.2s; }
        .pr-rot-bar.gap { background: rgba(239, 68, 68, 0.35); }
        .pr-rot-axis { display: flex; justify-content: space-between; font-size: 9px; color: #475569; padding: 0 2px; }

        /* pr-empty fallback */
        .pr-empty { color: #64748b; font-size: 11px; text-align: center; padding: 12px 0; }

        /* Phase 3 (C4): overlay compact tab strip + compare */
        .ov-tab-strip { display: flex; gap: 3px; padding: 3px 4px; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .ov-tab { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #94a3b8; padding: 2px 8px; border-radius: 4px; cursor: pointer; font-size: 10px; font-weight: 600; font-family: inherit; }
        .ov-tab:hover { background: rgba(34,211,238,0.12); color: #cbd5e1; }
        .ov-tab.active { background: rgba(34,211,238,0.18); border-color: rgba(34,211,238,0.4); color: #22d3ee; }
        .ov-cmp-pickers { display: flex; gap: 4px; align-items: center; padding: 4px; }
        .ov-cmp-pickers select { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.15); color: #e2e8f0; font-size: 10px; border-radius: 4px; padding: 2px 4px; flex: 1; font-family: inherit; min-width: 0; }
        .ov-cmp-pickers .pr-cmp-vs-lbl { color: #64748b; font-size: 10px; font-weight: 700; }
        .pr-cmp-head { display: flex; gap: 4px; align-items: stretch; padding: 4px; }
        .pr-cmp-side { flex: 1; background: rgba(0,0,0,0.25); border-radius: 4px; padding: 4px 6px; text-align: center; }
        .pr-cmp-side.a { border-left: 2px solid #22d3ee; } .pr-cmp-side.b { border-left: 2px solid #a78bfa; }
        .pr-cmp-name { font-size: 10px; font-weight: 600; color: #e2e8f0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .pr-cmp-dmg { font-size: 13px; font-weight: 800; color: #f1f5f9; }
        .pr-cmp-sub { font-size: 8px; color: #64748b; }
        .pr-cmp-delta { display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 48px; }
        .pr-cmp-delta-val { font-size: 11px; font-weight: 800; } .pr-cmp-delta-sub { font-size: 9px; font-weight: 700; }
        .pr-cmp-delta-lbl { font-size: 7px; color: #64748b; text-transform: uppercase; }
        .pr-cmp-delta-val.pos, .pr-cmp-delta-sub.pos, .pr-cmp-table td.pr-cmp-d.pos { color: #22c55e; }
        .pr-cmp-delta-val.neg, .pr-cmp-delta-sub.neg, .pr-cmp-table td.pr-cmp-d.neg { color: #ef4444; }
        .pr-cmp-delta-val.zero, .pr-cmp-delta-sub.zero, .pr-cmp-table td.pr-cmp-d.zero { color: #64748b; }
        table.pr-cmp-table.compact { width: 100%; border-collapse: collapse; font-size: 10px; }
        table.pr-cmp-table.compact th { color: #64748b; font-size: 9px; text-transform: uppercase; text-align: right; padding: 2px 5px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        table.pr-cmp-table.compact th:first-child { text-align: left; }
        table.pr-cmp-table.compact td { padding: 2px 5px; border-bottom: 1px solid rgba(255,255,255,0.04); }
        table.pr-cmp-table.compact td.num { text-align: right; font-variant-numeric: tabular-nums; }
        table.pr-cmp-table.compact td.cyan { color: #22d3ee; } table.pr-cmp-table.compact td.purple { color: #a78bfa; }
        table.pr-cmp-table.compact td.pr-cmp-skill { color: #e2e8f0; max-width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    </style>
</head>
<body class="">
    <div class="overlay">
        <div class="header" data-tauri-drag-region>
            <div class="title" data-tauri-drag-region>
                👥 <span class="party-code" id="partyCode">----</span>
            </div>
            <div class="header-right">
                <div class="status">
                    <span class="status-dot" id="statusDot"></span>
                    <span id="statusText">Connecting...</span>
                </div>
                <div class="controls">
                    <button onclick="toggleLock()" title="Toggle click-through (Ctrl+Shift+O)" id="lockBtn">🔒</button>
                    <button onclick="closeOverlay()" title="Close overlay">✕</button>
                </div>
            </div>
        </div>

        <!-- The room chooses THE boss server-side; we just label it. Chevrons step through
             stored encounters (Phase 2 / A5) — compact equivalent of the base view's switcher. -->
        <div class="boss-bar" id="bossBar" style="display:none;">
            <span id="encPrev" title="Previous encounter" onclick="ovEncStep(-1)" style="cursor:pointer; padding:0 3px; display:none;">‹</span>
            <span class="boss-cat" id="bossCat">🎯 Boss</span>
            <span class="boss-name" id="bossName">—</span>
            <span class="boss-total" id="bossTotal"></span>
            <span id="encPos" style="opacity:0.5; font-size:10px; margin-left:auto;"></span>
            <span id="encNext" title="Next encounter" onclick="ovEncStep(1)" style="cursor:pointer; padding:0 3px; display:none;">›</span>
        </div>

        <!-- Phase 3 (C4): compact tab strip — keeps the overlay from being one static panel. -->
        <div class="ov-tab-strip" id="ovTabStrip" style="display:none;">
            <button class="ov-tab active" data-ovtab="scoreboard" onclick="ovSwitchTab('scoreboard')">Board</button>
            <button class="ov-tab" data-ovtab="skills" onclick="ovSwitchTab('skills')">Skills</button>
            <button class="ov-tab" data-ovtab="compare" onclick="ovSwitchTab('compare')">Compare</button>
        </div>

        <div class="results" id="results">
            <div class="empty"><div class="empty-icon">⏳</div><div>Waiting for data...</div></div>
        </div>

        <div class="footer">
            <span id="playerCount">0 players</span>
            <span class="lock-hint" id="lockHint">Ctrl+Shift+O to lock</span>
        </div>
    </div>

    <div class="lock-indicator" id="lockIndicator"></div>

    <script>
    // ===== Owned-room spectator overlay (Workstream B) =====
    // Read-only WS to the Cloudflare PartyRoom; the room sends the merged boss scoreboard.
    // Runs in Tauri (transparent window + Rust click-through) OR a plain browser (for testing).
    const PARTY_WS_BASE = 'wss://tldps-party.kyle-526.workers.dev';

    const params = new URLSearchParams(window.location.search);
    const partyCode = (params.get('code') || '').toUpperCase();
    const playerName = decodeURIComponent(params.get('name') || 'Overlay');
    const userId = 'ov_' + Math.random().toString(36).slice(2, 10);

    /* @inject:party_render — GENERATED from /party_render.js by build.py inline_party_render(); edit the SOURCE, not here */
const PartyRender = {
  // Pretty labels for the room's boss_category (server-side detected).
  CATEGORY_LABELS: {
    archboss: '👑 Archboss',
    field_boss: '🌍 Field Boss',
    world_boss: '🌍 World Boss',
    raid_boss: '⚔️ Raid Boss',
    dungeon_boss: '🏰 Dungeon Boss',
    boss: '💀 Boss',
    mini_boss: '☠️ Mini Boss',
    unknown: '🎯 Boss',
  },
  catLabel(cat) {
    return PartyRender.CATEGORY_LABELS[cat] || PartyRender.CATEGORY_LABELS.unknown;
  },
  // Plain grouped integer (e.g. 1,234,567). Used for DPS + the base view's damage column.
  fmtNum(n) {
    return Math.round(Number(n) || 0).toLocaleString();
  },
  // Compact damage (1.2M / 34.5K) — the overlay's tight layout.
  fmtDmg(n) {
    n = Number(n) || 0;
    if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
    if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
    return Math.round(n).toLocaleString();
  },
  escapeHtml(t) {
    const d = document.createElement('div');
    d.textContent = t == null ? '' : t;
    return d.innerHTML;
  },

  // ===== Phase 3 / C2 — shared member-drill-down render (skill table + rotation) =====
  // Both surfaces feed these the raw ``rotation`` hit list the room serves via
  // ``get_member_detail`` (solo-hit shape: {relative_time, skill, damage, is_crit,
  // is_heavy}). SELF-CONTAINED on purpose — no dependency on the base app's globals
  // (``groupBySkill`` / ``calculateRotationStats`` / ``formatNumber``), so the overlay
  // (which has only PartyRender) renders identically. Variant via ``opts.compact``.

  // Raw hits -> per-skill rows (mirrors the solo skill block + groupBySkill), damage desc.
  aggregateSkills(rotation) {
    const rows = {};
    let total = 0;
    (rotation || []).forEach((h) => {
      const name = (h && h.skill) || 'Unknown';
      const r = rows[name] || (rows[name] = { name: name, damage: 0, hits: 0, crits: 0, heavies: 0 });
      const dmg = Number(h && h.damage) || 0;
      r.damage += dmg; r.hits += 1;
      if (h && h.is_crit) r.crits += 1;
      if (h && h.is_heavy) r.heavies += 1;
      total += dmg;
    });
    const list = Object.keys(rows).map((k) => rows[k]).sort((a, b) => b.damage - a.damage);
    list.forEach((r) => {
      r.percent = total > 0 ? +(r.damage / total * 100).toFixed(1) : 0;
      r.crit_rate = r.hits > 0 ? +(r.crits / r.hits * 100).toFixed(1) : 0;
      r.heavy_rate = r.hits > 0 ? +(r.heavies / r.hits * 100).toFixed(1) : 0;
    });
    return list;
  },

  // 60s rotation stats (port of the solo ``calculateRotationStats``) — self-contained.
  rotationStats(rotation) {
    if (!rotation || !rotation.length) return null;
    const dps = {};
    for (let i = 0; i <= 60; i++) dps[i] = 0;
    rotation.forEach((h) => {
      const s = Math.floor((h && h.relative_time) || 0);
      if (s >= 0 && s <= 60) dps[s] += Number(h && h.damage) || 0;
    });
    const first = Math.floor((rotation[0] && rotation[0].relative_time) || 0);
    const last = Math.floor((rotation[rotation.length - 1] && rotation[rotation.length - 1].relative_time) || 0);
    let peak = 0;
    for (let i = 0; i <= 55; i++) {
      let sum = 0;
      for (let j = i; j < i + 5; j++) sum += dps[j] || 0;
      if (sum / 5 > peak) peak = sum / 5;
    }
    const active = Object.keys(dps).filter((i) => dps[i] > 0 && +i >= first && +i <= last).length;
    const totalSec = Math.max(1, last - first + 1);
    return { dpsPerSecond: dps, peakDps: peak, activityRate: active / totalSec * 100, firstHitTime: first, lastHitTime: last };
  },

  // Skill-table HTML for a member's rotation. ``opts.compact`` => overlay variant.
  skillTableHtml(rotation, opts) {
    opts = opts || {};
    const skills = PartyRender.aggregateSkills(rotation);
    if (!skills.length) return '<div class="pr-empty">No skill data</div>';
    let max = 1;
    skills.forEach((s) => { if (s.damage > max) max = s.damage; });
    const esc = PartyRender.escapeHtml;
    if (opts.compact) {
      // overlay: name · bar · compact dmg · %
      const rows = skills.map((s) => {
        const w = (s.damage / max * 100).toFixed(1);
        return '<div class="pr-skill-row">'
          + '<span class="pr-skill-name" title="' + esc(s.name) + '">' + esc(s.name) + '</span>'
          + '<span class="pr-skill-bar"><span style="width:' + w + '%"></span></span>'
          + '<span class="pr-skill-dmg">' + PartyRender.fmtDmg(s.damage) + '</span>'
          + '<span class="pr-skill-pct">' + s.percent + '%</span>'
          + '</div>';
      }).join('');
      return '<div class="pr-skill-list">' + rows + '</div>';
    }
    // base: full 9-col table mirroring the solo skill table (reuses the solo num/bar classes).
    const body = skills.map((s) => {
      const w = (s.damage / max * 100).toFixed(1);
      return '<tr><td>' + esc(s.name) + '</td>'
        + '<td class="num cyan">' + PartyRender.fmtNum(s.damage) + '</td>'
        + '<td><div class="damage-bar-container"><div class="damage-bar" style="width:' + w + '%"></div></div></td>'
        + '<td class="num">' + s.hits + '</td>'
        + '<td class="num yellow">' + s.crits + '</td>'
        + '<td class="num yellow">' + s.crit_rate + '%</td>'
        + '<td class="num orange">' + s.heavies + '</td>'
        + '<td class="num orange">' + s.heavy_rate + '%</td>'
        + '<td class="num purple">' + s.percent + '%</td></tr>';
    }).join('');
    return '<table class="pr-skill-table"><thead><tr>'
      + '<th>Skill</th><th>Damage</th><th></th><th>Hits</th><th>Crits</th><th>Crit%</th>'
      + '<th>Heavy</th><th>Heavy%</th><th>%</th></tr></thead><tbody>' + body + '</tbody></table>';
  },

  // ===== Phase 3 / C4 — shared A/B member compare (head-to-head) =====
  // Mirrors the SOLO Run-Lab compare (``computeSkillMatrix`` + ``renderRunLabMatrix``/
  // ``renderRunLabHeader`` in index.html), but lives HERE so base + overlay render two
  // PARTY members identically with no dependency on the solo Run-Lab DOM/globals
  // (which read from ``sessionQueue`` slots A/B — solo-only). Same inputs as the
  // drill-down: each side is a raw ``rotation`` hit list ({relative_time, skill, damage,
  // is_crit, is_heavy}) the room serves via ``get_member_detail``. Per-skill rows are the
  // SAME aggregation the Run-Lab matrix shows (damage, hits, crit%, heavy%), sorted by
  // combined damage — so the head-to-head reads the same way as the solo lab.

  // Per-skill A/B matrix from two rotations. Returns rows sorted by combined damage desc.
  compareSkillMatrix(rotA, rotB) {
    const a = {}; PartyRender.aggregateSkills(rotA).forEach((r) => { a[r.name] = r; });
    const b = {}; PartyRender.aggregateSkills(rotB).forEach((r) => { b[r.name] = r; });
    const names = {};
    Object.keys(a).forEach((k) => { names[k] = true; });
    Object.keys(b).forEach((k) => { names[k] = true; });
    const blank = { damage: 0, hits: 0, crits: 0, heavies: 0, percent: 0, crit_rate: 0, heavy_rate: 0 };
    return Object.keys(names).map((name) => {
      const ra = a[name] || blank, rb = b[name] || blank;
      return {
        name: name,
        dmgA: ra.damage, dmgB: rb.damage, dmgDelta: ra.damage - rb.damage,
        hitsA: ra.hits, hitsB: rb.hits,
        critA: ra.crit_rate, critB: rb.crit_rate,
        heavyA: ra.heavy_rate, heavyB: rb.heavy_rate,
        pctA: ra.percent, pctB: rb.percent,
      };
    }).sort((x, y) => (y.dmgA + y.dmgB) - (x.dmgA + x.dmgB));
  },

  // Totals for one rotation: total damage, peak-5s DPS, crit/heavy rates over all hits.
  compareTotals(rotation) {
    let dmg = 0, hits = 0, crits = 0, heavies = 0;
    (rotation || []).forEach((h) => {
      dmg += Number(h && h.damage) || 0; hits += 1;
      if (h && h.is_crit) crits += 1;
      if (h && h.is_heavy) heavies += 1;
    });
    const stats = PartyRender.rotationStats(rotation);
    return {
      damage: dmg, hits: hits,
      crit_rate: hits > 0 ? +(crits / hits * 100).toFixed(1) : 0,
      heavy_rate: hits > 0 ? +(heavies / hits * 100).toFixed(1) : 0,
      peakDps: stats ? Math.round(stats.peakDps) : 0,
    };
  },

  // Head-to-head HTML for two members. ``meta`` = {name} label per side (defaults A/B).
  // ``opts.compact`` => overlay variant (tighter, fewer columns).
  compareHtml(rotA, rotB, metaA, metaB, opts) {
    opts = opts || {};
    const esc = PartyRender.escapeHtml;
    const labA = esc((metaA && metaA.name) || 'A');
    const labB = esc((metaB && metaB.name) || 'B');
    const hasA = rotA && rotA.length, hasB = rotB && rotB.length;
    if (!hasA || !hasB) {
      return '<div class="pr-empty">Pick two members with detailed data to compare.</div>';
    }
    const tA = PartyRender.compareTotals(rotA), tB = PartyRender.compareTotals(rotB);
    const rows = PartyRender.compareSkillMatrix(rotA, rotB);
    const sign = (v) => (v > 0 ? '+' : '');
    const dcls = (v) => (v > 0 ? 'pos' : v < 0 ? 'neg' : 'zero');

    // Header: peak-5s DPS for each side + delta (peak is the stable cross-member yardstick).
    const dmgDelta = tA.damage - tB.damage;
    const dmgPct = tB.damage > 0 ? (dmgDelta / tB.damage * 100) : 0;
    const fnum = opts.compact ? PartyRender.fmtDmg : PartyRender.fmtNum;
    const header = '<div class="pr-cmp-head">'
      + '<div class="pr-cmp-side a"><div class="pr-cmp-name">' + labA + '</div>'
        + '<div class="pr-cmp-dmg">' + fnum(tA.damage) + '</div>'
        + '<div class="pr-cmp-sub">Peak5s ' + fnum(tA.peakDps) + ' · ' + tA.crit_rate + '% C · ' + tA.heavy_rate + '% H</div></div>'
      + '<div class="pr-cmp-delta"><div class="pr-cmp-delta-val ' + dcls(dmgDelta) + '">'
        + sign(dmgDelta) + fnum(Math.abs(dmgDelta)) + '</div>'
        + '<div class="pr-cmp-delta-sub ' + dcls(dmgDelta) + '">' + sign(dmgPct) + Math.abs(dmgPct).toFixed(0) + '%</div>'
        + '<div class="pr-cmp-delta-lbl">total dmg Δ</div></div>'
      + '<div class="pr-cmp-side b"><div class="pr-cmp-name">' + labB + '</div>'
        + '<div class="pr-cmp-dmg">' + fnum(tB.damage) + '</div>'
        + '<div class="pr-cmp-sub">Peak5s ' + fnum(tB.peakDps) + ' · ' + tB.crit_rate + '% C · ' + tB.heavy_rate + '% H</div></div>'
      + '</div>';

    if (!rows.length) return header + '<div class="pr-empty">No overlapping skill data.</div>';

    let body, table;
    if (opts.compact) {
      // overlay: skill · A dmg · B dmg · Δ
      body = rows.map((r) => '<tr><td class="pr-cmp-skill" title="' + esc(r.name) + '">' + esc(r.name) + '</td>'
        + '<td class="num cyan">' + PartyRender.fmtDmg(r.dmgA) + '</td>'
        + '<td class="num purple">' + PartyRender.fmtDmg(r.dmgB) + '</td>'
        + '<td class="num pr-cmp-d ' + dcls(r.dmgDelta) + '">' + sign(r.dmgDelta) + PartyRender.fmtDmg(Math.abs(r.dmgDelta)) + '</td></tr>').join('');
      table = '<table class="pr-cmp-table compact"><thead><tr><th>Skill</th><th>' + labA + '</th><th>' + labB + '</th><th>Δ</th></tr></thead><tbody>' + body + '</tbody></table>';
    } else {
      // base: skill · A dmg · B dmg · Δ dmg · A hits/B hits · A crit%/B · A heavy%/B
      body = rows.map((r) => '<tr><td class="pr-cmp-skill" title="' + esc(r.name) + '">' + esc(r.name) + '</td>'
        + '<td class="num cyan">' + PartyRender.fmtNum(r.dmgA) + '</td>'
        + '<td class="num purple">' + PartyRender.fmtNum(r.dmgB) + '</td>'
        + '<td class="num pr-cmp-d ' + dcls(r.dmgDelta) + '">' + sign(r.dmgDelta) + PartyRender.fmtNum(Math.abs(r.dmgDelta)) + '</td>'
        + '<td class="num">' + r.hitsA + '<span class="pr-cmp-vs">/</span>' + r.hitsB + '</td>'
        + '<td class="num yellow">' + r.critA + '%<span class="pr-cmp-vs">/</span>' + r.critB + '%</td>'
        + '<td class="num orange">' + r.heavyA + '%<span class="pr-cmp-vs">/</span>' + r.heavyB + '%</td></tr>').join('');
      table = '<table class="pr-cmp-table"><thead><tr><th>Skill</th><th>' + labA + '</th><th>' + labB + '</th><th>Δ</th>'
        + '<th>Hits A/B</th><th>Crit% A/B</th><th>Heavy% A/B</th></tr></thead><tbody>' + body + '</tbody></table>';
    }
    return header + table;
  },

  // Rotation chart HTML (61 one-second bars, 0..60s). ``opts.compact`` => overlay variant.
  rotationChartHtml(rotation, opts) {
    opts = opts || {};
    const stats = PartyRender.rotationStats(rotation);
    if (!stats) return '<div class="pr-empty">No rotation data</div>';
    let max = 1;
    for (let i = 0; i <= 60; i++) { if ((stats.dpsPerSecond[i] || 0) > max) max = stats.dpsPerSecond[i]; }
    let bars = '';
    for (let i = 0; i <= 60; i++) {
      const d = stats.dpsPerSecond[i] || 0;
      const h = max > 0 ? (d / max * 100) : 0;
      let cls = 'normal';
      if (d === 0 && i >= stats.firstHitTime && i <= stats.lastHitTime) cls = 'gap';
      bars += '<div class="pr-rot-bar ' + cls + '" style="height:' + Math.max(h, 1) + '%"></div>';
    }
    return '<div class="pr-rot">'
      + '<div class="pr-rot-meta">Activity ' + stats.activityRate.toFixed(0) + '% · Peak 5s '
        + PartyRender.fmtNum(Math.round(stats.peakDps)) + '</div>'
      + '<div class="pr-rot-chart' + (opts.compact ? ' compact' : '') + '">' + bars + '</div>'
      + '<div class="pr-rot-axis"><span>0s</span><span>15s</span><span>30s</span><span>45s</span><span>60s</span></div>'
      + '</div>';
  },
};
    /* @end:party_render */
    // Overlay glue -> single source above (keeps existing call sites; logic lives in PartyRender).
    const BOSS_CAT_LABELS = PartyRender.CATEGORY_LABELS;
    const formatNumber = PartyRender.fmtNum;
    const formatDamage = PartyRender.fmtDmg;
    const escapeHtml = PartyRender.escapeHtml;

    const state = {
        connected: false, encounterActive: false, scoreboard: null, isLocked: false,
        // Phase 2 (A5): multi-encounter stepping.
        encounters: [], activeId: null, viewingId: null, boards: {},
        // Phase 3 (C3): member drill-down.
        detail: null, memberDetails: {},
        // Phase 3 (C4): compact tabs + A/B compare.
        activeTab: 'scoreboard', skillsMember: null, cmpA: null, cmpB: null,
    };
    let ws = null, wantOpen = false, reconnectTimer = null;

    document.getElementById('partyCode').textContent = partyCode || '----';

    // ---- Tauri / browser bridge (graceful in a plain browser) ----
    const TAURI = window.__TAURI__ || null;
    function tauriInvoke(cmd, args) { try { if (TAURI?.core?.invoke) return TAURI.core.invoke(cmd, args); } catch (e) {} return null; }
    // Overlay debug log: console + (in Tauri) appended to overlay-debug.log next to the exe.
    function ovlog(event, data) {
        const line = event + (data !== undefined ? ' ' + JSON.stringify(data) : '');
        try { console.log('[ov] ' + line); } catch (e) {}
        tauriInvoke('log_line', { msg: line });
    }

    function connect() {
        if (!partyCode) { updateStatus('error', 'No party code'); ovlog('no-party-code'); return; }
        ovlog('connect', { code: partyCode, name: playerName });
        wantOpen = true;
        if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
        if (ws) { try { ws.onclose = null; ws.close(); } catch (e) {} ws = null; }
        const qs = new URLSearchParams({ user_id: userId, username: playerName, leader: '0', spectator: '1' });
        try { ws = new WebSocket(`${PARTY_WS_BASE}/party/${encodeURIComponent(partyCode)}?${qs.toString()}`); }
        catch (e) { updateStatus('error', 'Error'); return; }

        ws.onopen = () => { state.connected = true; ovlog('ws-open'); updateStatus(state.encounterActive ? 'recording' : 'connected', state.encounterActive ? '● REC' : 'Connected'); };
        ws.onmessage = (ev) => {
            let m; try { m = JSON.parse(ev.data); } catch (e) { return; }
            ovlog('msg', { type: m.type, entries: m.scoreboard ? (m.scoreboard.entries || []).length : undefined, boss: m.scoreboard ? m.scoreboard.boss : undefined });
            switch (m.type) {
                case 'welcome':
                    state.scoreboard = m.scoreboard || null;
                    state.encounterActive = !!m.encounter_active;
                    state.encounters = m.encounters || [];
                    state.activeId = m.active_encounter_id || (m.scoreboard && m.scoreboard.encounter_id) || null;
                    if (m.scoreboard && m.scoreboard.encounter_id) state.boards[m.scoreboard.encounter_id] = m.scoreboard;
                    if (state.viewingId == null) state.viewingId = state.activeId;
                    render(); updateStatus(state.encounterActive ? 'recording' : 'connected', state.encounterActive ? '● REC' : 'Connected');
                    break;
                case 'scoreboard':
                    if (m.encounter_id) state.boards[m.encounter_id] = m;
                    state.scoreboard = m;
                    if (state.viewingId == null || state.viewingId === m.encounter_id) render();
                    break;
                case 'encounters': {
                    const prevActive = state.activeId;
                    state.encounters = m.list || [];
                    state.activeId = m.active_id || null;
                    // Auto-follow the new active only if the user was on the previous active / following.
                    if (state.viewingId == null || state.viewingId === prevActive) state.viewingId = state.activeId;
                    render();
                    break;
                }
                case 'encounter_start': state.encounterActive = true; updateStatus('recording', '● REC'); break;
                case 'encounter_end': state.encounterActive = false; updateStatus('connected', 'Connected'); break;
                case 'member_detail': {
                    const cacheKey = m.encounter_id + ':' + m.user_id;
                    state.memberDetails[cacheKey] = { skills: m.skills || null, rotation: m.rotation || null };
                    if (state.detail && state.detail.encounter_id === m.encounter_id && state.detail.user_id === m.user_id) {
                        renderOvDetail();
                    }
                    break;
                }
            }
        };
        ws.onerror = () => { ovlog('ws-error'); };
        ws.onclose = () => {
            state.connected = false; ovlog('ws-close', { wantOpen }); updateStatus('error', 'Reconnecting…');
            if (!wantOpen) return;
            reconnectTimer = setTimeout(() => { if (wantOpen) connect(); }, 2000);
        };
    }

    function updateStatus(type, text) {
        const dot = document.getElementById('statusDot');
        dot.className = 'status-dot';
        if (type === 'connected') dot.classList.add('connected');
        if (type === 'recording') dot.classList.add('connected', 'recording');
        document.getElementById('statusText').textContent = text;
    }

    // Prev/next encounter stepping (A5) — compact analogue of the base switcher.
    function renderEncNav() {
        const list = state.encounters || [];
        const prev = document.getElementById('encPrev');
        const next = document.getElementById('encNext');
        const pos = document.getElementById('encPos');
        if (!prev) return;
        if (list.length <= 1) { prev.style.display = next.style.display = 'none'; pos.textContent = ''; return; }
        prev.style.display = next.style.display = '';
        const curId = state.viewingId || state.activeId;
        let idx = list.findIndex((e) => e.encounter_id === curId);
        if (idx < 0) idx = list.length - 1;
        pos.textContent = `${idx + 1}/${list.length}`;
        prev.style.opacity = idx > 0 ? '0.85' : '0.25';
        next.style.opacity = idx < list.length - 1 ? '0.85' : '0.25';
    }
    function ovEncStep(delta) {
        const list = state.encounters || [];
        if (!list.length) return;
        const curId = state.viewingId || state.activeId;
        let idx = list.findIndex((e) => e.encounter_id === curId);
        if (idx < 0) idx = list.length - 1;
        state.viewingId = list[Math.max(0, Math.min(list.length - 1, idx + delta))].encounter_id;
        render();
    }

        // ---- Phase 3 (C4): compact tabs (Board / Skills / Compare) ----
        function ovCurrentBoard() {
            const viewId = state.viewingId || state.activeId;
            return (viewId && state.boards[viewId]) ? state.boards[viewId] : (!viewId ? state.scoreboard : null);
        }
        function ovEnsureDetail(encId, userId) {
            if (!encId || !userId) return;
            const k = encId + ':' + userId;
            if (state.memberDetails[k]) return;
            if (ws && ws.readyState === WebSocket.OPEN) {
                ovlog('member-detail-request', { encounter_id: encId, user_id: userId, via: state.activeTab });
                ws.send(JSON.stringify({ type: 'get_member_detail', encounter_id: encId, user_id: userId }));
            }
        }
        function ovRotationFor(encId, userId) {
            const d = state.memberDetails[encId + ':' + userId];
            return (d && d.rotation) || null;
        }
        function ovDrillableEntries() {
            const b = ovCurrentBoard();
            return (b && Array.isArray(b.entries)) ? b.entries.filter((e) => e.has_detail) : [];
        }
        function ovMemberOptions(selected) {
            const entries = ovDrillableEntries();
            return ['<option value="">—</option>'].concat(
                entries.map((e) => '<option value="' + escapeHtml(e.user_id) + '"' + (e.user_id === selected ? ' selected' : '') + '>' + escapeHtml(e.username) + '</option>')
            ).join('');
        }
        function ovSwitchTab(tab) {
            state.activeTab = tab;
            if (tab !== 'scoreboard') state.detail = null;
            document.querySelectorAll('#ovTabStrip .ov-tab').forEach((b) => b.classList.toggle('active', b.dataset.ovtab === tab));
            render();
        }
        function ovUpdateTabStrip() {
            // Show tabs only once there's a board with drillable members worth exploring.
            const strip = document.getElementById('ovTabStrip');
            if (!strip) return;
            strip.style.display = ovDrillableEntries().length ? 'flex' : 'none';
        }
        function renderOvSkillsTab() {
            const container = document.getElementById('results');
            const board = ovCurrentBoard();
            const entries = ovDrillableEntries();
            if (!entries.length) { container.innerHTML = '<div class="pr-empty">No member breakdowns yet.</div>'; return; }
            const ids = entries.map((e) => e.user_id);
            if (!ids.includes(state.skillsMember)) state.skillsMember = entries[0].user_id;
            const encId = board.encounter_id;
            const picker = '<div class="ov-cmp-pickers"><select onchange="ovSkillsMemberChange(this.value)">' + ovMemberOptions(state.skillsMember) + '</select></div>';
            ovEnsureDetail(encId, state.skillsMember);
            const rot = ovRotationFor(encId, state.skillsMember);
            let body;
            if (!rot) body = '<div class="ov-detail-loading">Loading…</div>';
            else if (!rot.length) body = '<div class="pr-empty">No breakdown for this member.</div>';
            else body = PartyRender.skillTableHtml(rot, { compact: true }) + PartyRender.rotationChartHtml(rot, { compact: true });
            container.innerHTML = picker + body;
            document.getElementById('playerCount').textContent = entries.length + ' player' + (entries.length !== 1 ? 's' : '');
        }
        function ovSkillsMemberChange(uid) { state.skillsMember = uid || null; render(); }
        function renderOvCompareTab() {
            const container = document.getElementById('results');
            const board = ovCurrentBoard();
            const entries = ovDrillableEntries();
            if (entries.length < 2) { container.innerHTML = '<div class="pr-empty">Need two members with data to compare.</div>'; return; }
            const ids = entries.map((e) => e.user_id);
            if (!ids.includes(state.cmpA)) state.cmpA = entries[0].user_id;
            if (!ids.includes(state.cmpB) || state.cmpB === state.cmpA) state.cmpB = (entries.find((e) => e.user_id !== state.cmpA) || entries[1]).user_id;
            const encId = board.encounter_id;
            const nameOf = (uid) => { const e = entries.find((x) => x.user_id === uid); return e ? e.username : uid; };
            ovEnsureDetail(encId, state.cmpA); ovEnsureDetail(encId, state.cmpB);
            const rotA = ovRotationFor(encId, state.cmpA), rotB = ovRotationFor(encId, state.cmpB);
            const pickers = '<div class="ov-cmp-pickers"><select onchange="ovCmpChange(\'A\', this.value)">' + ovMemberOptions(state.cmpA)
                + '</select><span class="pr-cmp-vs-lbl">VS</span><select onchange="ovCmpChange(\'B\', this.value)">' + ovMemberOptions(state.cmpB) + '</select></div>';
            let body;
            if (!rotA || !rotB) body = '<div class="ov-detail-loading">Loading…</div>';
            else body = PartyRender.compareHtml(rotA, rotB, { name: nameOf(state.cmpA) }, { name: nameOf(state.cmpB) }, { compact: true });
            container.innerHTML = pickers + body;
        }
        function ovCmpChange(slot, uid) {
            if (slot === 'A') state.cmpA = uid || null; else state.cmpB = uid || null;
            if (state.cmpA && state.cmpA === state.cmpB) {
                const other = ovDrillableEntries().find((e) => e.user_id !== uid);
                if (other) { if (slot === 'A') state.cmpB = other.user_id; else state.cmpA = other.user_id; }
            }
            render();
        }

    function render() {
        if (state.detail) { renderOvDetail(); return; }
        ovUpdateTabStrip();
        // C4: route non-board tabs.
        if (state.activeTab === 'skills')  { renderOvSkillsTab();  return; }
        if (state.activeTab === 'compare') { renderOvCompareTab(); return; }
        const container = document.getElementById('results');
        // Resolve the viewed encounter's board (explicit selection, else active).
        const viewId = state.viewingId || state.activeId;
        const sb = (viewId && state.boards[viewId]) ? state.boards[viewId]
                 : (!viewId ? state.scoreboard : null);
        const entries = (sb && Array.isArray(sb.entries)) ? sb.entries : [];
        const bossBar = document.getElementById('bossBar');
        renderEncNav();

        if (entries.length === 0) {
            // Keep the bar (with nav chevrons) visible when there are multiple encounters, so a
            // spectator who stepped onto an empty/uncached past board can step back to the live one.
            if ((state.encounters || []).length > 1) {
                bossBar.style.display = 'flex';
                const meta = (state.encounters || []).find((e) => e.encounter_id === viewId);
                document.getElementById('bossCat').textContent = BOSS_CAT_LABELS[(meta && meta.boss_category) || 'unknown'] || BOSS_CAT_LABELS.unknown;
                document.getElementById('bossName').textContent = (meta && meta.boss) || '—';
                document.getElementById('bossTotal').textContent = '';
            } else {
                bossBar.style.display = 'none';
            }
            container.innerHTML = `<div class="empty"><div class="empty-icon">${state.encounterActive ? '⚔️' : '⏳'}</div><div>${state.encounterActive ? 'Recording — results post on combat exit' : 'Waiting for data...'}</div></div>`;
            document.getElementById('playerCount').textContent = '0 players';
            return;
        }

        bossBar.style.display = 'flex';
        document.getElementById('bossCat').textContent = BOSS_CAT_LABELS[sb.boss_category] || BOSS_CAT_LABELS.unknown;
        document.getElementById('bossName').textContent = sb.boss || 'Boss';
        document.getElementById('bossTotal').textContent = formatDamage(sb.total_damage || 0) + ' total';

        let html = '';
        const encId = sb.encounter_id || viewId || '';
        entries.forEach((e) => {
            const rank = e.rank || 1;
            const pct = (typeof e.contribution === 'number') ? e.contribution : 0;
            const isSelf = e.username === playerName;
            let rankClass = rank === 1 ? 'gold' : rank === 2 ? 'silver' : rank === 3 ? 'bronze' : '';
            const clickable = e.has_detail ? 'clickable' : '';
            const onclick = e.has_detail ? ' onclick="ovOpenDetail(\'' + encId + '\',\'' + e.user_id + '\')"' : '';
            html += `
                <div class="result-row ${isSelf ? 'self' : ''} ${clickable}"${onclick}>
                    <div class="rank ${rankClass}">${rank}</div>
                    <div class="player-info">
                        <div class="player-name">${escapeHtml(e.username)}<span class="pct">${pct.toFixed(0)}%</span></div>
                        <div class="damage-bar"><div class="damage-bar-fill" style="width:${pct.toFixed(1)}%"></div></div>
                    </div>
                    <div class="dps">${formatNumber(e.dps || 0)}</div>
                    <div class="damage">${formatDamage(e.total_damage || 0)}</div>
                </div>`;
        });
        container.innerHTML = html;
        document.getElementById('playerCount').textContent = `${entries.length} player${entries.length !== 1 ? 's' : ''}`;
    }

    function ovOpenDetail(encId, userId) {
        // Resolve username from the viewed board's entries.
        var boardKey = encId;
        var board = state.boards[boardKey] || state.scoreboard;
        var username = userId;
        if (board && Array.isArray(board.entries)) {
            for (var i = 0; i < board.entries.length; i++) {
                if (board.entries[i].user_id === userId) { username = board.entries[i].username; break; }
            }
        }
        state.detail = { encounter_id: encId, user_id: userId, username: username };
        var cacheKey = encId + ':' + userId;
        if (!state.memberDetails[cacheKey] && ws && ws.readyState === WebSocket.OPEN) {
            ovlog('member-detail-request', { encounter_id: encId, user_id: userId });
            ws.send(JSON.stringify({ type: 'get_member_detail', encounter_id: encId, user_id: userId }));
        }
        renderOvDetail();
    }

    function ovCloseDetail() {
        state.detail = null;
        render();
    }

    function renderOvDetail() {
        var container = document.getElementById('results');
        var d = state.detail;
        if (!d) { render(); return; }
        var cacheKey = d.encounter_id + ':' + d.user_id;
        var cached = state.memberDetails[cacheKey];
        var header = '<div class="ov-detail-header">'
            + '<button class="ov-detail-back" onclick="ovCloseDetail()">&#8249; Back</button>'
            + '<span class="ov-detail-name">' + escapeHtml(d.username) + '</span>'
            + '</div>';
        var body;
        if (!cached) {
            body = '<div class="ov-detail-loading">Loading…</div>';
        } else if (!cached.rotation || !cached.rotation.length) {
            body = '<div class="pr-empty">No detailed breakdown available</div>';
        } else {
            body = PartyRender.skillTableHtml(cached.rotation, { compact: true })
                 + PartyRender.rotationChartHtml(cached.rotation, { compact: true });
        }
        container.innerHTML = header + body;
    }

    // formatNumber / formatDamage / escapeHtml now come from PartyRender (single source, aliased above).

    // ---- lock (click-through) + close — Rust owns the real click-through ----
    function applyLockUI(isLocked) {
        state.isLocked = isLocked;
        ovlog('lock', { locked: isLocked });
        document.getElementById('lockBtn').textContent = isLocked ? '🔓' : '🔒';
        document.getElementById('lockHint').textContent = isLocked ? 'Ctrl+Shift+O to interact' : 'Click-through OFF';
        const ind = document.getElementById('lockIndicator');
        ind.textContent = isLocked ? '🔓 Locked (click-through)' : '🔒 Unlocked';
        ind.classList.remove('show'); void ind.offsetWidth; ind.classList.add('show');
    }
    function toggleLock() {
        if (TAURI) { tauriInvoke('toggle_lock'); }   // Rust flips setIgnoreCursorEvents + emits 'lock-changed'
        else { applyLockUI(!state.isLocked); }        // browser test fallback
    }
    function closeOverlay() {
        if (TAURI) { tauriInvoke('close_overlay'); }
        else { window.close(); }
    }
    // Rust emits 'lock-changed' (true/false) when the hotkey or button toggles.
    if (TAURI?.event?.listen) { TAURI.event.listen('lock-changed', (e) => applyLockUI(!!e.payload)); }

    // Robust window drag: the data-tauri-drag-region cursor shows on its own, but some
    // Windows/WebView2 setups need an explicit startDragging() on mousedown to actually move.
    if (TAURI?.window?.getCurrentWindow) {
        const appWin = TAURI.window.getCurrentWindow();
        document.addEventListener('mousedown', (e) => {
            if (e.button !== 0 || !e.target || !e.target.closest) return;
            if (e.target.closest('button')) return;                 // buttons still click
            if (e.target.closest('[data-tauri-drag-region]')) {
                ovlog('drag-start');
                appWin.startDragging().catch((err) => ovlog('drag-error', { err: String(err) }));
            }
        });
    }

    connect();
    </script>
</body>
</html>
